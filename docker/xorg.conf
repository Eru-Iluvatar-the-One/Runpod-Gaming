# Headless NVIDIA Xorg config (NO monitor required)
Section "ServerLayout"
    Identifier "Layout0"
    Screen "Screen0"
    Option "AllowEmptyConfiguration" "True"
EndSection

Section "Device"
    Identifier "Device0"
    Driver "nvidia"
    VendorName "NVIDIA Corporation"
    Option "AllowEmptyInitialConfiguration" "true"
    Option "EnableGPUAccess" "true"
    Option "Interactive" "0"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "Device0"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1920x1080"
    EndSubSection
EndSection
